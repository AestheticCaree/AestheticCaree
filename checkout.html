<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - Aesthetic Care</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Checkout</h1>

<form id="checkoutForm">
  <input type="text" id="name" placeholder="Name" required><br>
  <input type="email" id="email" placeholder="Email" required><br>
  <input type="tel" id="phone" placeholder="Phone Number" required><br>
  <input type="text" id="address" placeholder="Address" required><br>
  <input type="text" id="city" placeholder="City" required><br>
  <input type="text" id="province" placeholder="Province" required><br>
  <textarea id="notes" placeholder="Order Notes (Optional)"></textarea><br>

  <label><input type="radio" name="payment" value="Cash on Delivery" required> Cash on Delivery</label><br>
  <label><input type="radio" name="payment" value="EasyPaisa" required> EasyPaisa</label><br>
  <p id="easypaisaInfo" style="display:none;">Pay via EasyPaisa using this number: 03444610117</p>

  <button type="submit">Place Order</button>
</form>

<script>
const easypaisaRadio = document.querySelector('input[name="payment"][value="EasyPaisa"]');
const codRadio = document.querySelector('input[name="payment"][value="Cash on Delivery"]');
const easypaisaDiv = document.getElementById('easypaisaInfo');

easypaisaRadio.addEventListener('change', () => { easypaisaDiv.style.display = 'block'; });
codRadio.addEventListener('change', () => { easypaisaDiv.style.display = 'none'; });

document.getElementById('checkoutForm').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const email = document.getElementById('email').value;
  const address = document.getElementById('address').value;
  const city = document.getElementById('city').value;
  const province = document.getElementById('province').value;
  const notes = document.getElementById('notes').value;
  const payment = document.querySelector('input[name="payment"]:checked').value;

  const orderText = `New Order – Aesthetic Care\nName: ${name}\nPhone: ${phone}\nEmail: ${email}\nAddress: ${address}, ${city}, ${province}\nNotes: ${notes}\nPayment: ${payment}`;

  // Email
  window.location.href = `mailto:AestheticCare002@gmail.com?subject=New Order&body=${encodeURIComponent(orderText)}`;

  // WhatsApp
  window.open(`https://api.whatsapp.com/send?phone=+923344461017&text=${encodeURIComponent(orderText)}`, '_blank');

  alert("Order Placed!");
  this.reset();
});
</script>

</body>
</html>
